<body>
  <div id="homeScreen">
    <h1>Team Bingo</h1>

    <button id="createGameBtn">Create New Game</button>

    <h3>Join a Game</h3>
    <input id="joinCodeInput" placeholder="Enter Game Code" />
    <button id="joinGameBtn">Join</button>
  </div>

  <div id="gameScreen" class="hidden">
    <h2>Game Code: <span id="gameCodeDisplay"></span></h2>

    <div class="controls">
      <button id="newCardBtn">New Card</button>
      <button id="callNumberBtn">Call Next Number</button>
      <div id="lastNumber"></div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="header-row">
          <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
        </div>
        <div id="cardGrid" class="grid"></div>
      </div>

      <div class="called">
        <h2>Numbers Called</h2>
        <div id="calledList"></div>
      </div>
    </div>

    <div id="bingoMessage" class="bingo-message hidden">
      BINGO! 🎉
    </div>
  </div>

  <script src="script.js"></script>
</body>
